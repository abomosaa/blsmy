<section class="py-24 bg-slate-50 min-h-[80vh] flex items-center">
  <div class="max-w-md mx-auto px-4 w-full">
    <div class="bg-white rounded-3xl shadow-xl p-8 sm:p-12 border border-slate-100">
      <div class="text-center mb-8">
        <a routerLink="/" class="inline-flex items-center gap-2 mb-4">
          <img src="assets/logo-white.webp" alt="بلسمي" class="h-12" />
          <span class="text-xl font-bold text-slate-900 font-tajawal">{{ lang.isArabic() ? 'بلسمي' : 'Blsmy' }}</span>
        </a>
        <h2 class="text-2xl font-bold text-slate-900 font-tajawal">
          {{ lang.isArabic() ? 'تسجيل الدخول' : 'Login' }}
        </h2>
      </div>

      <form (ngSubmit)="onLogin()" class="space-y-5">
        <div>
          <label for="medical-email" class="block text-sm font-bold text-slate-700 mb-2">
            {{ lang.isArabic() ? 'البريد الإلكتروني' : 'Email' }}
          </label>
          <input
            id="medical-email"
            type="email"
            [(ngModel)]="email"
            name="email"
            required
            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500 transition-all">
        </div>

        <div>
          <label for="medical-password" class="block text-sm font-bold text-slate-700 mb-2">
            {{ lang.isArabic() ? 'كلمة المرور' : 'Password' }}
          </label>
          <div class="relative">
            <input
              id="medical-password"
              [type]="showPassword() ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              required
              class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500 transition-all">
            <button
              type="button"
              (click)="togglePassword()"
              class="absolute top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"
              [class.left-3]="lang.isArabic()"
              [class.right-3]="!lang.isArabic()">
              <mat-icon>{{ showPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </div>
        </div>

        <div class="text-right">
          <a routerLink="/contact" class="text-sky-600 text-sm font-medium hover:underline">
            {{ lang.isArabic() ? 'هل نسيت كلمة المرور ؟' : 'Forgot password?' }}
          </a>
        </div>

        @if (noticeMessage()) {
          <div class="p-3 bg-sky-50 text-sky-700 rounded-xl text-sm flex items-center gap-2">
            <mat-icon class="text-lg">info</mat-icon>
            {{ noticeMessage() }}
          </div>
        }

        <button
          type="submit"
          [disabled]="isLoading()"
          class="w-full py-4 bg-sky-600 hover:bg-sky-700 text-white font-bold rounded-2xl transition-all shadow-lg shadow-sky-200 disabled:opacity-50">
          @if (isLoading()) {
            {{ lang.isArabic() ? 'جاري تسجيل الدخول...' : 'Signing in...' }}
          } @else {
            {{ lang.isArabic() ? 'تسجيل الدخول' : 'Login' }}
          }
        </button>
      </form>

      <div class="mt-6 text-center space-y-3">
        <button (click)="lang.toggle()" class="text-sky-600 text-sm font-bold hover:underline">
          {{ lang.isArabic() ? 'English' : 'عربي' }}
        </button>
        <p>
          <a routerLink="/" class="text-slate-500 text-sm hover:text-sky-600 transition-colors">
            {{ lang.isArabic() ? 'الذهاب لموقع بلسمي' : 'Go to Blsmy website' }}
          </a>
        </p>
      </div>
    </div>
  </div>
</section>
